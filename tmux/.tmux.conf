set -as terminal-overrides ',*:U8=1'

set-option -g status-position top
set-option -g default-terminal "$TERM"
# set-option -ga terminal-overrides ",screen-256color:Tc"
set -ag terminal-overrides ",xterm-kitty:Tc"
set-option -g default-shell /bin/fish
set-option -g detach-on-destroy off

set-option -g status-interval 1

set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# Additional bindings
# always open new pane on the same path
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
# bind e display-popup -E -d "#{pane_current_path}" "ranger"
bind e display-popup -E -d "#{pane_current_path}" "lf"
# bind y display-popup -E "ranger_project"
bind y display-popup -E "lf_project"
bind J resize-pane -x 25%

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
set-option -sg escape-time 10
set -g mode-keys vi
set -g set-clipboard on
set -g mouse on
set -g focus-events on

# Indexing
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'maxpetretta/tmux-monokai-pro'

# Enable powerline symbols
set -g @monokai-show-powerline true

# Enable specific plugins in the status bar (available: battery, cpu-usage, git, time, etc.)
set -g @monokai-plugins "cpu-usage ram-usage time"

##### Pane Styling (dim inactive panes, highlight active) #####
set -g pane-border-style "fg=#727072"
set -g pane-active-border-style "fg=#ffd866"
set -g window-style "fg=#908e8f,bg=#252226"
set -g window-active-style "fg=#fcfcfa,bg=#2d2a2e"

##### Status Bar Base (removes green background)
set -g status-style "bg=#2d2a2e,fg=#c1c0c0"

set -g status-position top
set -g status-justify centre
set -g status-left-length 40
set -g status-right-length 120
set -g status-interval 5


set -g pane-border-lines double   # double-line borders (visually thickest)
# set -g pane-border-lines heavy    # heavy/thick borders
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#2d2a2e#,bg=#ffd866#,bold],#[fg=#c1c0c0#,bg=#403e41]} #P: #{pane_current_command} #[default]"

##### Window Tabs #####

set -g window-status-separator " "

# inactive tab
set -g window-status-format "#[fg=#2d2a2e,bg=#2d2a2e]#[fg=#c1c0c0,bg=#2d2a2e] #I:#W #[fg=#2d2a2e,bg=#2d2a2e]"

# active tab
set -g window-status-current-format "#[fg=#ffd866,bg=#2d2a2e]#[fg=#2d2a2e,bg=#ffd866,bold] #I:#W #[fg=#ffd866,bg=#2d2a2e]"

setw -g window-status-activity-style "fg=#ff6188,bg=#2d2a2e"

##### Right Status Segments (Rounded) #####

set -g status-right-length 120

set -g status-right "\
#(~/.local/bin/claude-status.sh) \
#[fg=#ab9df2,bg=#2d2a2e]\
#[fg=#2d2a2e,bg=#ab9df2]  #(git rev-parse --abbrev-ref HEAD 2>/dev/null) \
#[fg=#ab9df2,bg=#2d2a2e] \
#[fg=#78dce8,bg=#2d2a2e]\
#[fg=#2d2a2e,bg=#78dce8] 󰥔 %H:%M \
#[fg=#78dce8,bg=#2d2a2e] \
#[fg=#ffd866,bg=#2d2a2e]\
#[fg=#2d2a2e,bg=#ffd866]  %Y-%m-%d \
#[fg=#ffd866,bg=#2d2a2e]"

